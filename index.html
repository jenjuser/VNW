<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Việt Nam - Hành Trình Huyền Thoại</title>
    <style>
        /* 1. HIỆU ỨNG CUỘN SLIDE */
        html {
            scroll-snap-type: y mandatory;
            scroll-behavior: smooth;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: #000;
        }

        /* 2. THANH HEADER (Cố định ở trên) */
        header {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 70px; /* Độ cao thanh menu */
            z-index: 1000;
            display: flex;
            align-items: center;
            padding: 0 15px;
            /* Màu đỏ gradient giống hình của bạn */
            background: linear-gradient(to bottom, #b30000, #800000);
            border-bottom: 2px solid #ffd700;
        }

        /* Logo nằm bên trái */
        .logo-box {
            height: 55px;
            margin-right: 20px;
        }
        .logo-box img {
            height: 100%;
            object-fit: contain;
        }

        /* Ảnh menu (Khám phá, Cách chơi...) nằm ở giữa */
        .menu-img-box {
            flex-grow: 1;
            display: flex;
            justify-content: center;
            height: 45px;
        }
        .menu-img-box img {
            height: 100%;
            object-fit: contain;
        }

        /* 3. CÁC SLIDE */
        section {
            width: 100vw;
            height: 100vh;
            scroll-snap-align: start;
            position: relative;
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
        }

        /* Slide 1: Sử dụng tấm ảnh gốc của bạn (Có cả tiêu đề và phong cảnh) */
        #home {
            background-image: url('background_full.jpg'); 
        }

        /* Các slide tiếp theo (Nếu bạn có ảnh khác) */
        #slide2 {
            background-image: url('background2.jpg');
            background-color: #1a1a1a; 
            display: flex;
            justify-content: center;
            align-items: center;
        }

        h2 {
            color: #ffd700;
            font-size: 50px;
            font-family: serif;
        }
    </style>
</head>
<body>

    <header>
        <div class="logo-box">
            <img src="logo.png" alt="Logo">
        </div>

        <div class="menu-img-box">
            <img src="menu.png" alt="Menu">
        </div>
    </header>

    <section id="home">
        </section>

    <section id="slide2">
        <h2>NỘI DUNG KHÁM PHÁ</h2>
    </section>

</body>
</html>
